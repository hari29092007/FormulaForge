<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (function () {
        try {
          var savedTheme = sessionStorage.getItem('formulaTheme');
          document.documentElement.dataset.theme = savedTheme === 'light' ? 'light' : 'dark';
        } catch (error) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <title>FormulaForge Quiz</title>
    <meta name="description" content="FormulaForge Quiz Mode — test your formula knowledge with fast multiple-choice practice." />
  </head>
  <body>
    <main id="quiz-root"></main>
    <script type="module" src="/src/quiz.js"></script>
  </body>
</html>
